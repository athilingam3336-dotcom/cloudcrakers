<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CloudCrackers</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Unbounded:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="icon" href="../icons/favicon.ico">
</head>
<body>
    <div class="auth-page">
        <div class="auth-visual">
            <div>
                <span class="eyebrow">Join CloudCrackers</span>
                <h2>Create An Account, <span class="highlight">Unlock The Sale</span></h2>
            </div>
        </div>
        <div class="auth-form-side">
            <div class="auth-card">
                <a href="../index.html"><span class="logo-text">Cloud<em>Crackers</em></span></a>
                <h1 style="margin-top:22px;">Create Account</h1>
                <p class="muted-text">Sign up to start shopping this Diwali.</p>

                <form>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fname">First Name</label>
                            <input class="form-control" type="text" id="fname" placeholder="Arun">
                        </div>
                        <div class="form-group">
                            <label for="lname">Last Name</label>
                            <input class="form-control" type="text" id="lname" placeholder="Kumar">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="remail">Email Address</label>
                        <input class="form-control" type="email" id="remail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="rphone">Phone Number</label>
                        <input class="form-control" type="tel" id="rphone" placeholder="+91 98765 43210">
                    </div>
                    <div class="form-group">
                        <label for="rpassword">Password</label>
                        <input class="form-control" type="password" id="rpassword" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label class="form-check"><input type="checkbox" required> I agree to the <a href="#" style="color:var(--gold);">Terms &amp; Conditions</a></label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
                </form>

                <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
